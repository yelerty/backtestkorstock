name: Quarterly KOSPI Top200 Operating Profit

on:
  schedule:
    # 분기별 실행: 1월, 4월, 7월, 10월 1일 09:00 KST (UTC 00:00)
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  fetch-top200:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl lxml

    - name: Fetch KOSPI Top 200 operating profit data
      run: |
        python fetch_top200_operating_profit.py top200_operating_profit_kospi.xlsx

    - name: Commit and push if changed
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add top200_operating_profit_kospi.xlsx
        git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Update KOSPI Top200 operating profit - $(date +'%Y-%m-%d')" && git push)
